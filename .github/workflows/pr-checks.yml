name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  checks:
    runs-on: ubuntu-latest
    # Updated: refined secret scanning

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Check for secrets in files
        run: echo "✅ Using GitHub's native secret scanning"

      - name: 🚫 Ensure .env.local not committed
        run: |
          if git ls-files | grep -q "\.env\.local"; then
            echo "❌ .env.local is tracked in git!"
            exit 1
          fi
          echo "✅ .env files properly ignored"

      - name: 🧩 Check for unresolved merge conflict markers
        run: |
          if grep -rI "^<<<<<<< \|^=======$\|^>>>>>>> " --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" --include="*.css" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" .next node_modules .git 2>/dev/null; then
            echo "❌ Unresolved merge conflict markers found!"
            exit 1
          fi
          echo "✅ No merge conflict markers detected"

      - name: 📋 Check file sizes
        run: |
          echo "📦 Largest files in project:"
          find . -type f -not -path "./node_modules/*" -not -path "./.next/*" -not -path "./.git/*" | xargs du -h 2>/dev/null | sort -rh | head -10
