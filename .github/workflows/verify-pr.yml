name: CI Verify PR

on:
  pull_request:
    branches: [ master ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Verify Linter and Formatters
        run: npm run lint --if-present

      - name: Execute Vitest Unit Tests
        run: npm run test -- hooks/__tests__/useSafePolling.test.js
