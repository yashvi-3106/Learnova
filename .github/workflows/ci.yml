name: CI - Build & Lint

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🎨 Run Prettier Code Formatting Check
        run: npm run format:check

      - name: 🔧 Fix native bindings for Linux CI
        run: |
          set -euo pipefail
          fix_native() {
            local pkg="$1" dir="$2"
            mkdir -p "$dir"
            echo "Installing $pkg..."
            TAR=$(npm pack "$pkg")
            tar -xzf "$TAR" -C "$dir" --strip-components=1
            rm -f "$TAR"
          }

          # Rollup
          RV=$(node -p "require('./node_modules/rollup/package.json').version")
          fix_native "@rollup/rollup-linux-x64-gnu@$RV" node_modules/@rollup/rollup-linux-x64-gnu

          # Parcel Watcher
          PV=$(node -p "require('./node_modules/@parcel/watcher/package.json').version")
          fix_native "@parcel/watcher-linux-x64-glibc@$PV" node_modules/@parcel/watcher-linux-x64-glibc

          # Lightning CSS (needed by next/font)
          LV=$(node -p "require('./node_modules/lightningcss/package.json').version")
          fix_native "lightningcss-linux-x64-gnu@$LV" node_modules/lightningcss-linux-x64-gnu
          cp node_modules/lightningcss-linux-x64-gnu/*.node node_modules/lightningcss/

          # Tailwind CSS Oxide
          OV=$(node -p "require('./node_modules/@tailwindcss/oxide/package.json').version")
          fix_native "@tailwindcss/oxide-linux-x64-gnu@$OV" node_modules/@tailwindcss/oxide-linux-x64-gnu

      - name: 🔍 Verify native bindings
        run: |
          missing=0
          for dir in \
            node_modules/@rollup/rollup-linux-x64-gnu \
            node_modules/@parcel/watcher-linux-x64-glibc \
            node_modules/lightningcss-linux-x64-gnu \
            node_modules/@tailwindcss/oxide-linux-x64-gnu; do
            if [ ! -d "$dir" ] || [ -z "$(ls "$dir"/*.node 2>/dev/null)" ]; then
              echo "❌ Missing native binding: $dir"
              missing=1
            else
              echo "  ✓ $(basename "$dir")"
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: 🧪 Run unit tests
        run: npm test

      - name: ⚡ Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: 🔨 Build project
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 123456789
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:123456789:web:abcdefghijklmnop
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-DUMMY
          MONGODB_URI: mongodb://localhost/dummy
          MONGODB_DB: dummy
          FIREBASE_PROJECT_ID: dummy
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC1\n-----END PRIVATE KEY-----"
          FIREBASE_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
          BLOB_READ_WRITE_TOKEN: dummy_token
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: dummy
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: dummy
          NEXT_PUBLIC_EMAILJS_USER_ID: dummy
          GROQ_API_KEY: dummy

      - name: ✅ Build successful
        run: echo "✨ Build completed successfully!"
